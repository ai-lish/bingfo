<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冰火大戰 完整版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,'PingFang TC','Microsoft YaHei',sans-serif;background:#080c14;color:#f0f4f8;min-height:100vh;overflow-x:hidden;user-select:none}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#ui{position:relative;z-index:1;width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
#setup{text-align:center;padding:40px 24px}
#setup h1{font-size:2.2rem;font-weight:900;background:linear-gradient(90deg,#0077b6,#fff 45%,#e63946);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.subtitle{color:#666;font-size:0.88rem;margin-bottom:40px}
.player-select{display:flex;justify-content:center;gap:10px;margin-bottom:32px;flex-wrap:wrap}
.pbtn{padding:11px 24px;border-radius:12px;border:2px solid #2a2a2a;background:#0f0f0f;color:#ccc;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit}
.pbtn:hover{border-color:#444}
.pbtn.selected{border-color:#0077b6;background:rgba(0,119,182,0.12)}
.start-btn{margin-top:12px;padding:13px 44px;border-radius:14px;border:none;background:linear-gradient(135deg,#0077b6,#00b4d8);color:#fff;font-size:1.05rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,180,216,0.3)}
#gameHud{display:none;width:100%;max-width:860px}
.hud-top{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:10px;font-size:0.8rem;color:#666}
#totalArea{text-align:center;padding:14px}
#totalLbl{font-size:0.68rem;text-transform:uppercase;letter-spacing:2px;color:#444;margin-bottom:4px}
#totalVal{font-size:3rem;font-weight:900;transition:all 0.4s}
#totalVal.positive{color:#00b4d8;text-shadow:0 0 30px rgba(0,180,216,0.5)}
#totalVal.negative{color:#ff6b35;text-shadow:0 0 30px rgba(255,107,53,0.5)}
#totalVal.zero{color:#4ade80;text-shadow:0 0 30px rgba(74,222,128,0.5)}
#sgnSts{font-size:0.78rem;color:#555;margin-top:4px}
#deckArea{display:flex;justify-content:center;gap:20px;margin:8px 0}
.dp{position:relative;width:58px;height:80px;text-align:center}
.dp-val{position:absolute;inset:0;background:linear-gradient(145deg,#1a2540,#0d1520);border-radius:9px;border:1px solid #2a3548;display:flex;align-items:center;justify-content:center;font-size:0.62rem;color:#3a4a5a;font-weight:700}
.pl{font-size:0.58rem;text-align:center;color:#333;margin-top:2px}
#playersArea{display:flex;flex-direction:column;gap:7px;width:100%;max-width:780px}
.pr{display:flex;align-items:center;gap:9px;padding:7px 11px;border-radius:10px;background:rgba(255,255,255,0.02);transition:all 0.3s}
.pr.active{background:rgba(0,180,216,0.09);border:1px solid rgba(0,180,216,0.28)}
.pr.winner{background:rgba(74,222,128,0.09);border:1px solid rgba(74,222,128,0.3)}
.pname{font-weight:600;font-size:0.83rem;min-width:50px;color:#bbb}
.pcards{display:flex;gap:2px;flex-wrap:wrap}
.mc{width:24px;height:33px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.5rem;font-weight:700;flex-shrink:0}
.mc-ice{background:linear-gradient(145deg,#d8f3f7,#c8e8f0);color:#0077b6;border:1px solid rgba(168,237,234,0.35)}
.mc-fire{background:linear-gradient(145deg,#fde8d8,#f5d8c8);color:#c2410c;border:1px solid rgba(255,159,28,0.35)}
.mc-special{background:linear-gradient(145deg,#ece8ff,#ddd8f5);color:#9333ea;border:1px solid rgba(192,132,252,0.35)}
.pcount{margin-left:auto;font-size:0.72rem;color:#444}
#myHandArea{display:none;width:100%;max-width:680px;margin-top:auto;padding-top:12px}
#mhl{display:flex;justify-content:center;gap:9px;align-items:center;margin-bottom:9px;font-size:0.78rem;color:#555}
#lcb{padding:4px 11px;border-radius:8px;border:1px solid rgba(251,191,36,0.4);background:rgba(251,191,36,0.08);color:#fbbf24;font-size:0.7rem;cursor:pointer;display:none;font-family:inherit;font-weight:600}
#lcb.active{border-color:#fbbf24;background:rgba(251,191,36,0.15);animation:pulse 1s infinite}
#passBtn{padding:4px 11px;border-radius:8px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.04);color:#888;font-size:0.7rem;cursor:pointer;font-family:inherit}
#passBtn:hover{background:rgba(255,255,255,0.08)}
#multiInfo{text-align:center;font-size:0.78rem;color:#555;margin-bottom:7px;min-height:18px}
#mcArea{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;min-height:82px;align-items:center}
.gc{width:56px;height:78px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.14s,box-shadow 0.14s;position:relative;font-weight:900;font-size:0.95rem;flex-shrink:0}
.gc:hover{transform:translateY(-9px) scale(1.05);z-index:10;box-shadow:0 12px 28px rgba(0,0,0,0.5)}
.gc.sel{transform:translateY(-13px) scale(1.07);z-index:11;box-shadow:0 0 18px rgba(255,255,255,0.25)}
.gc-ice{background:linear-gradient(145deg,#d8f3f7,#c8e8f0);color:#0077b6;border:1px solid rgba(168,237,234,0.5);box-shadow:0 3px 10px rgba(0,180,216,0.18)}
.gc-fire{background:linear-gradient(145deg,#fde8d8,#f5d8c8);color:#c2410c;border:1px solid rgba(255,159,28,0.5);box-shadow:0 3px 10px rgba(255,107,53,0.18)}
.gc-special{background:linear-gradient(145deg,#ece8ff,#ddd8f5);color:#9333ea;border:1px solid rgba(192,132,252,0.5);box-shadow:0 3px 10px rgba(192,132,252,0.18);font-size:0.58rem;line-height:1.2;text-align:center;padding:3px}
.gc-x0{background:linear-gradient(145deg,#fef9c3,#fef08a);color:#a16207;border:1px solid rgba(251,191,36,0.5);box-shadow:0 3px 10px rgba(251,191,36,0.15)}
.gc-pm{background:linear-gradient(145deg,#ede9fe,#ddd6fe);color:#7c3aed;border:1px solid rgba(124,58,237,0.5);box-shadow:0 3px 10px rgba(124,58,237,0.15)}
.gc.disabled,.gc.played{opacity:0.22;pointer-events:none;transform:scale(0.84)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.65}}
#playRow{margin-top:9px;text-align:center}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.76);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-ov.active{display:flex}
.modal{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:16px;padding:26px 30px;max-width:370px;width:92%;text-align:center}
.modal h2{font-size:1.1rem;margin-bottom:9px}
.modal p{font-size:0.86rem;color:#777;margin-bottom:16px}
.mbtn{padding:9px 26px;border-radius:10px;border:none;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:transform 0.13s}
.mbtn:hover{transform:scale(1.03)}
.bp{background:linear-gradient(135deg,#0077b6,#00b4d8);color:#fff}
.bs{background:#181818;border:1px solid #333;color:#888}
#speedOv{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column}
#speedOv.active{display:flex}
#st{font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:12px}
#sval{font-size:3.2rem;font-weight:900;color:#00b4d8;text-shadow:0 0 40px rgba(0,180,216,0.55);margin-bottom:5px}
#sh{color:#555;font-size:0.83rem;margin-bottom:18px}
#scd{font-size:2.2rem;font-weight:900;color:#fbbf24;margin-bottom:16px}
.sbtn{padding:13px 36px;border-radius:14px;border:none;background:linear-gradient(135deg,#e63946,#ff6b35);color:#fff;font-size:0.98rem;font-weight:700;cursor:pointer;font-family:inherit;animation:pulse 0.8s ease-in-out infinite;margin-bottom:12px}
#sres{font-size:0.85rem;color:#666;min-height:22px}
#winOv{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:400;display:none;align-items:center;justify-content:center;flex-direction:column}
#winOv.active{display:flex}
#wt{font-size:2.4rem;font-weight:900;margin-bottom:9px}
#ws{font-size:0.95rem;color:#666;margin-bottom:28px}
#mlog{position:fixed;bottom:12px;right:12px;max-width:240px;z-index:50}
.msg{background:rgba(0,0,0,0.82);border:1px solid #2a2a2a;border-radius:8px;padding:6px 11px;font-size:0.73rem;color:#aaa;margin-bottom:4px;animation:si 0.3s ease}
@keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tg{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:13px}
.tb{padding:8px 15px;border-radius:10px;border:2px solid #2a2a2a;background:#0f0f0f;color:#ccc;font-size:0.8rem;cursor:pointer;font-family:inherit}
.tb:hover{border-color:#0077b6}
.tb.sel{border-color:#4ade80;background:rgba(74,222,128,0.08)}
.pm-cards{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.dc{width:52px;height:72px;border-radius:9px;border:2px solid #2a2a2a;background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:0.6rem;font-weight:700;color:#ccc;font-family:inherit;transition:all 0.13s}
.dc:hover{border-color:#9333ea;transform:translateY(-3px)}
.dc.sel{border-color:#4ade80;background:rgba(74,222,128,0.08)}
@keyframes tp{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
.tpop{animation:tp 0.33s ease}
@keyframes cf{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-55px) scale(0.55);opacity:0}}
.cfly{animation:cf 0.33s ease forwards}
@keyframes sk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.sshake{animation:sk 0.38s ease}
@media(max-width:600px){#totalVal{font-size:2.1rem}.gc{width:46px;height:66px;font-size:0.82rem}.gc-special{font-size:0.52rem}.mc{width:20px;height:28px;font-size:0.44rem}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="ui">
  <div id="setup">
    <h1>🧊🔥 冰火大戰</h1>
    <p class="subtitle">Ice & Fire · 完整版</p>
    <p style="color:#555;font-size:0.84rem;margin-bottom:22px">選擇對戰人數（你 + AI）</p>
    <div class="player-select">
      <button class="pbtn" data-n="2">2 人</button>
      <button class="pbtn" data-n="3">3 人</button>
      <button class="pbtn selected" data-n="4">4 人</button>
      <button class="pbtn" data-n="5">5 人</button>
      <button class="pbtn" data-n="6">6 人</button>
    </div>
    <button class="start-btn" id="startBtn">開始遊戲</button>
  </div>
  <div id="gameHud" style="display:none;width:100%;max-width:860px">
    <div class="hud-top">
      <span id="rndDisp">第 1 回合</span>
      <span id="phDisp">等待中…</span>
      <span id="sgnInd"></span>
    </div>
    <div id="totalArea">
      <div id="totalLbl">累積總和</div>
      <div id="totalVal" class="positive">+0</div>
      <div id="sgnSts">🧊 需要打出負數</div>
    </div>
    <div id="deckArea" style="display:flex;justify-content:center;gap:20px;margin:8px 0">
      <div style="text-align:center"><div class="dp"><div class="dp-val" id="dkVal">?</div></div><div class="pl">牌庫</div></div>
      <div style="text-align:center"><div class="dp"><div class="dp-val" id="dsVal" style="color:#3a4a5a"></div></div><div class="pl">棄牌</div></div>
    </div>
    <div id="playersArea"></div>
    <div id="myHandArea">
      <div id="mhl"><span>你的手牌</span><button id="lcb" onclick="toggleLCB()">⚠️ Last Card</button><button id="passBtn" onclick="doPass()">Pass</button></div>
      <div id="multiInfo"></div>
      <div id="mcArea"></div>
      <div id="playRow"><button class="start-btn" style="font-size:0.88rem;padding:9px 30px" id="playBtn" onclick="handlePlayBtn()">出牌</button></div>
    </div>
  </div>
</div>

<div id="speedOv" class="modal-ov">
  <div style="text-align:center">
    <div id="st">⚡ 鬥快出！</div>
    <div id="sval">+0</div>
    <div id="sh">看準時機，第一個點擊合法出牌！</div>
    <div id="scd">5</div>
    <button class="sbtn" id="speedBtn" onclick="speedPlay()">🔥 我要出牌！</button>
    <div id="sres"></div>
  </div>
</div>

<div id="winOv" class="modal-ov">
  <div style="text-align:center;padding:32px">
    <div id="wt">🏆</div>
    <div id="ws"></div>
    <button class="start-btn" onclick="restartGame()">再玩一次</button>
  </div>
</div>

<div class="modal-ov" id="genMod"><div class="modal"><h2 id="genTitle">提示</h2><p id="genMsg"></p><button class="mbtn bp" onclick="closeGen()">確定</button></div></div>

<div class="modal-ov" id="tgtMod"><div class="modal"><h2 id="tgtTitle">選擇目標</h2><div class="tg" id="tgtBtns"></div><div style="display:flex;gap:9px;justify-content:center"><button class="mbtn bs" onclick="closeTgt()">取消</button><button class="mbtn bp" id="tgtConf" onclick="confirmTgt()">確認</button></div></div></div>

<div class="modal-ov" id="pmMod"><div class="modal"><h2>± 卡模式</h2><p id="pmHint">選擇使用方式</p><div style="display:flex;flex-direction:column;gap:9px;margin-bottom:13px"><button class="mbtn bs" style="background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.35);color:#a78bfa" onclick="pmMode(0)">🔄 <b>獨立打出</b><br><small style="color:#666;font-weight:400">改變下一位玩家的加減方向</small></button><button class="mbtn bs" style="background:rgba(0,180,216,0.07);border:1px solid rgba(0,180,216,0.28);color:#00b4d8" onclick="pmMode(1)">🔢 <b>配合數字牌</b><br><small style="color:#666;font-weight:400">選擇一張數字牌並改變其正負</small></button></div><div class="pm-cards" id="pmNumCards"></div><button class="mbtn bs" id="pmConfBtn" style="display:none" onclick="confirmPmCard()">確認</button><button class="mbtn bs" onclick="closePm()">取消</button></div></div>

<div class="modal-ov" id="discMod"><div class="modal"><h2>選擇要棄的牌</h2><div class="pm-cards" id="discCards"></div><div style="display:flex;gap:9px;justify-content:center"><button class="mbtn bs" onclick="closeDisc()">取消</button><button class="mbtn bp" id="discConf" onclick="confirmDisc()">確認</button></div></div></div>

<div id="mlog"></div>

<script>
const $=id=>document.getElementById(id);
function getSign(n){return n>0?'positive':n<0?'negative':'zero'}
function fmt(n){return n>0?'+'+n:''+n}
function ones(n){if(n===0)return 0;return(n>0?1:-1)*(Math.abs(n)%10)}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function cLabel(c){return c.kind==='special'?c.type:(c.val>0?'+':'')+c.val}
function cCss(c){if(c.kind==='special'){if(c.type==='×0')return'gc-x0';if(c.type==='±')return'gc-pm';return'gc-special';}return c.val>0?'gc-ice':'gc-fire';}
function mCss(c){return c.kind==='special'?'mc-special':c.val>0?'mc-ice':'mc-fire';}
function msg(t){const d=document.createElement('div');d.className='msg';d.textContent=t;$('mlog').appendChild(d);setTimeout(()=>d.remove(),4000);}


// ─── DRAW CARD ───
function drawCard(n){
  const drawn=[];
  for(let i=0;i<n;i++){
    if(G.deck.length===0){
      if(G.discard.length<=1){msg('⚠️ 牌庫空了！');break;}
      const top=G.discard.pop();
      G.deck=shuffle(G.discard);
      G.discard=[top];
    }
    drawn.push(G.deck.pop());
  }
  return drawn;
}
function buildDeck(){
  const d=[];
  const iceC=[6,5,5,5,5,4,4,3,3]; // +1:6, +2~5:5 each, +6~7:4 each, +8~9:3 each = 40
  for(let v=1;v<=9;v++)for(let c=0;c<iceC[v-1];c++)d.push({val:v,kind:'ice'});
  const fireC=[6,5,5,5,5,4,4,3,3]; // -1:6, -2~-5:5 each, -6~-7:4 each, -8~-9:3 each = 40
  for(let v=1;v<=9;v++)for(let c=0;c<fireC[v-1];c++)d.push({val:-v,kind:'fire'});
  const sp=[{type:'×(-2)',sub:'mult',v:-2},{type:'×(-3)',sub:'mult',v:-3},{type:'×(-4)',sub:'mult',v:-4},{type:'÷(-2)',sub:'div',v:-2},{type:'÷(-3)',sub:'div',v:-3},{type:'÷(-4)',sub:'divAll',v:-4},{type:'×0',sub:'zero',v:0},{type:'±',sub:'pm',v:0}];
  const ct=[2,2,2,2,2,2,2,4];
  sp.forEach((s,i)=>{for(let c=0;c<ct[i];c++)d.push({...s,kind:'special'})});
  return shuffle(d);
}

let G={};
function fs(){return{total:0,deck:[],discard:[],players:[],cur:0,phase:'setup',sf:false,passes:0,round:1,speedW:-1,speedP:false,lcd:false,winnersName:'',extra:false,sel:[],multi:false,winner:-1,pc:4,aiLock:false,tgtMode:null,discMode:null,pmMode:null,pmPC:null};}

document.getElementById('startBtn').onclick=function(){
  const sel=document.querySelector('.pbtn.selected');
  const n=parseInt(sel.dataset.n);
  G=fs();G.pc=n;G.deck=buildDeck();
  for(let i=0;i<n;i++){const h=[];for(let c=0;c<6;c++){const card=G.deck.pop();if(card!==undefined)h.push(card);}G.players.push({name:i===0?'你':'AI '+(i),hand:h,isAI:i>0});}
  let sc;do{sc=G.deck.pop();}while(sc.kind==='special'&&G.deck.length>10);
  if(sc.kind==='special'){G.deck=shuffle([...G.deck,sc]);sc=G.deck.pop();}
  G.discard=[sc];G.total=sc.v!==undefined?sc.v:sc.val;G.phase='speed';
  $('setup').style.display='none';$('gameHud').style.display='block';$('myHandArea').style.display='block';
  drawBg();renderAll();showSpeed();
};
function restartGame(){$('winOv').classList.remove('active');$('gameHud').style.display='none';$('setup').style.display='block';G=fs();}

function canPlay(card,total,handLength){
  // Special cards cannot be played as last card (÷ cards are exception - can be last if paired with number)
  // Non-div special cards as last card: always invalid
  if(handLength===1&&card.kind==='special'&&card.sub!=='div'&&card.sub!=='divAll')return false;
  // ÷ cards: result (total / divisor) must be integer
  if(card.kind==='special'){
    if(card.sub==='div'||card.sub==='divAll'){
      if(card.v===0||!Number.isInteger(total/card.v))return false;
    }return true;
  }
  if(total===0)return true;
  const n=total+card.val;return getSign(n)!==getSign(total);
}
function validCards(hand,total){return hand.filter(c=>canPlay(c,total,hand.length));}

function drawBg(){const canvas=$('bg'),ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;ctx.clearRect(0,0,canvas.width,canvas.height);const g=ctx.createRadialGradient(canvas.width*0.15,canvas.height*0.2,0,canvas.width*0.5,canvas.height*0.5,canvas.width*0.7);g.addColorStop(0,'rgba(0,60,100,0.12)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);const g2=ctx.createRadialGradient(canvas.width*0.85,canvas.height*0.8,0,canvas.width*0.5,canvas.height*0.5,canvas.width*0.7);g2.addColorStop(0,'rgba(180,40,20,0.08)');g2.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g2;ctx.fillRect(0,0,canvas.width,canvas.height);}
window.addEventListener('resize',drawBg);

function renderAll(){renderTotal();renderPlayers();renderMyHand();renderDeck();renderHUD();}
function renderTotal(){const el=$('totalVal'),s=getSign(G.total);el.textContent=fmt(G.total);el.className='positive '+s;$('sgnSts').textContent=s==='positive'?'🧊 需要打出負數令總和變負或零':s==='negative'?'🔥 需要打出正數令總和變正或零':'⭕ 總和為零，任何數字牌皆可出！';el.classList.remove('tpop');void el.offsetWidth;el.classList.add('tpop');setTimeout(()=>el.classList.remove('tpop'),330);}
function renderPlayers(){const area=$('playersArea');area.innerHTML='';G.players.forEach((p,idx)=>{const row=document.createElement('div');row.className='pr'+(idx===G.cur&&G.phase==='turn'?' active':'')+(idx===G.winner?' winner':'');const nm=document.createElement('div');nm.className='pname';nm.textContent=p.name+(idx===0?' (你)':'');row.appendChild(nm);const cd=document.createElement('div');cd.className='pcards';const show=Math.min(p.hand.length,12);for(let i=0;i<show;i++){const mc=document.createElement('div');mc.className='mc '+mCss(p.hand[i]);mc.textContent=cLabel(p.hand[i]);cd.appendChild(mc);}if(p.hand.length>12){const et=document.createElement('div');et.className='mc';et.textContent='…';et.style.color='#555';cd.appendChild(et);}row.appendChild(cd);const ct=document.createElement('div');ct.className='pcount';ct.textContent=p.hand.length+' 張';row.appendChild(ct);area.appendChild(row);});}
function renderMyHand(){if(G.phase!=='turn'||G.cur!==0){$('myHandArea').style.display='none';return;}$('myHandArea').style.display='block';const myHand=G.players[0].hand,area=$('mcArea');area.innerHTML='';const sel=G.sel;myHand.forEach((c,idx)=>{const btn=document.createElement('button');btn.className='gc '+cCss(c);btn.style.cssText='width:56px;height:78px;cursor:pointer;font-size:0.88rem;';btn.textContent=c.type?c.type:cLabel(c);btn.onclick=()=>toggleSel(idx);if(sel.includes(idx))btn.classList.add('sel');const isLast=myHand.length===1&&c.kind==='special';if(!canPlay(c,G.total,myHand.length)&&!isLast)btn.classList.add('disabled');if(isLast)btn.classList.add('disabled');area.appendChild(btn);});if(myHand.length===1){$('lcb').style.display='inline';$('lcb').classList.toggle('active',!G.lcd);}else{$('lcb').style.display='none';G.lcd=false;}$('passBtn').style.display=G.cur===0&&G.phase==='turn'?'inline':'none';$('multiInfo').textContent=G.multi?'可一次出 1-3 張（總和作為值）':'';$('playBtn').style.display=G.cur===0&&G.phase==='turn'?'inline-block':'none';$('playBtn').textContent=G.multi?'出牌（1-3張）':'出牌';}
function renderDeck(){$('dkVal').textContent=G.deck.length;if(G.discard.length>0){const top=G.discard[G.discard.length-1];$('dsVal').textContent=cLabel(top);$('dsVal').style.color=top.kind==='special'?'#9333ea':top.val>0?'#0077b6':'#c2410c';}else{$('dsVal').textContent='';}}
function renderHUD(){$('rndDisp').textContent='第 '+G.round+' 回合';$('phDisp').textContent=G.phase==='speed'?'⚡ 鬥快出':G.phase==='turn'?(G.cur===0?'你的回合':'等待…'):'—';$('sgnInd').textContent=G.sf?'± 方向已反轉':'';}

function toggleSel(idx){if(G.aiLock)return;const myHand=G.players[0].hand;const c=myHand[idx];if(!canPlay(c,G.total)&&!G.multi)return;const pos=G.sel.indexOf(idx);if(pos>=0){G.sel.splice(pos,1);}else{if(G.multi){if(G.sel.length<3)G.sel.push(idx);}else{G.sel=[idx];}}renderMyHand();}
function toggleLCB(){G.lcd=!G.lcd;$('lcb').classList.toggle('active',G.lcd);msg(G.lcd?'⚠️ 已宣告 Last Card':'Last Card 宣告已取消');}
function doPass(){if(G.cur!==0||G.phase!=='turn')return;G.sel=[];G.passes=(G.passes||0)+1;msg('你 Pass 了');if(G.passes>=G.pc-1){G.multi=true;msg('全體 Pass！可一次出 1-3 張牌');}nextTurn();}
function handlePlayBtn(){if(G.cur!==0||G.phase!=='turn')return;const myHand=G.players[0].hand;if(G.sel.length===0){msg('請先選擇要出的牌');return;}if(G.sel.length===1){const c=myHand[G.sel[0]];if(c.kind==='special'){handleSpecialPlay(c);}else{executePlay([c]);}}else{executePlay(G.sel.map(i=>myHand[i]));}}
function handleSpecialPlay(c){switch(c.sub){case 'mult':G.discMode={card:c};openDiscModal();break;case 'div':G.tgtMode={card:c,count:1};openTgtModal('選擇目標玩家（抽 1 張）');break;case 'divAll':G.tgtMode={card:c,all:true};openTgtModal('確認：所有其他玩家各抽 1 張');break;case 'zero':executePlay([c]);break;case 'pm':openPmModal();break;}}


// ─── DISCARD MODAL ───
function openDiscModal(){const area=$('discCards');area.innerHTML='';const myHand=G.players[0].hand.filter((c,i)=>!G.sel.includes(i));myHand.forEach((c)=>{const btn=document.createElement('button');btn.className='dc';btn.innerHTML='<span style="font-size:0.62rem">'+cLabel(c)+'</span>';btn.onclick=()=>{area.querySelectorAll('.dc').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');G._discSel=c;};area.appendChild(btn);});$('discMod').classList.add('active');}
function closeDisc(){$('discMod').classList.remove('active');G._discSel=null;}
function confirmDisc(){if(!G._discSel){msg('請選擇要棄的牌');return;}const discarded=G._discSel;const p=G.players[0];const idx=p.hand.indexOf(discarded);if(idx>=0)p.hand.splice(idx,1);G.discard.push(discarded);G._discSel=null;$('discMod').classList.remove('active');executePlay([G.discMode.card]);G.discMode=null;}

// ─── TARGET MODAL ───
function openTgtModal(title){$('tgtTitle').textContent=title;const area=$('tgtBtns');area.innerHTML='';G._tgtSel=null;G.players.forEach((p,idx)=>{if(idx===G.cur)return;const btn=document.createElement('button');btn.className='tb';btn.textContent=p.name;btn.onclick=()=>{area.querySelectorAll('.tb').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');G._tgtSel=idx;};area.appendChild(btn);});$('tgtMod').classList.add('active');}
function closeTgt(){$('tgtMod').classList.remove('active');G._tgtSel=null;G.tgtMode=null;}
function confirmTgt(){if(G._tgtSel===null){msg('請選擇目標玩家');return;}const tgt=G._tgtSel;const mode=G.tgtMode;$('tgtMod').classList.remove('active');G._tgtSel=null;G.tgtMode=null;const drawn=drawCard(mode.count||1);drawn.forEach(c=>G.players[tgt].hand.push(c));msg(G.players[tgt].name+' 抽了 '+drawn.length+' 張');if(mode.all){G.extra=true;msg(G.players[G.cur].name+' 可再多出一張！');}const oldTotal=G.total;const newTotal=ones((oldTotal+mode.card.v)/mode.card.v);msg('÷ 效果：'+fmt(oldTotal)+' → '+fmt(newTotal));G.total=newTotal;G.discard.push(mode.card);const p=G.players[G.cur];const idx=p.hand.indexOf(mode.card);if(idx>=0)p.hand.splice(idx,1);renderAll();checkWin(G.cur);if(!G.winner&&G.cur>0){setTimeout(()=>doAITurn(),800);}else if(!G.winner&&G.extra){G.extra=false;if(G.cur===0)msg('你可以再多出一張！');}}

// ─── ± MODAL ───
function openPmModal(){$('pmHint').textContent='選擇使用方式';$('pmNumCards').innerHTML='';$('pmNumCards').style.display='none';$('pmMod').classList.add('active');}
function pmMode(mode){G.pmMode=mode;if(mode===0){$('pmMod').classList.remove('active');executePlay([{kind:'special',type:'±',sub:'pm',v:0}]);}else{$('pmHint').textContent='選擇要改變正負的數字牌';const area=$('pmNumCards');area.innerHTML='';area.style.display='flex';const myHand=G.players[0].hand;myHand.forEach((c,idx)=>{if(c.kind==='special')return;const btn=document.createElement('button');btn.className='dc';btn.innerHTML='<span style="font-size:0.62rem">'+(c.val>0?'+':'')+c.val+' → '+(c.val<0?'+':'-')+Math.abs(c.val)+'</span>';btn.onclick=()=>{area.querySelectorAll('.dc').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');G.pmPC={card:c,idx:idx};};area.appendChild(btn);});$('pmConfBtn').style.display='inline-block';}}
function closePm(){$('pmMod').classList.remove('active');G.pmMode=null;G.pmPC=null;}
function confirmPmCard(){if(!G.pmPC){msg('請選擇一張數字牌');return;}const {card,idx}=G.pmPC;$('pmMod').classList.remove('active');const flipped={...card,val:-card.val};G.discard.push({kind:'special',type:'±',sub:'pm',v:0});const p=G.players[0];p.hand.splice(p.hand.indexOf(card),1);G.total=ones(G.total+flipped.val);msg('± 改變 '+(card.val>0?'+':'')+card.val+' → '+fmt(flipped.val)+'，總和 = '+fmt(G.total));G.pmMode=null;G.pmPC=null;renderAll();checkWin(0);if(!G.winner&&G.cur>0){setTimeout(()=>doAITurn(),800);}}

// ─── EXECUTE PLAY ───
function executePlay(cards){
  if(G.cur===0){G.sel=[];}
  const p=G.players[G.cur];
  cards.forEach(c=>{const idx=p.hand.indexOf(c);if(idx>=0)p.hand.splice(idx,1);G.discard.push(c);});
  const oldTotal=G.total;
  const divCards=cards.filter(c=>c.kind==='special'&&(c.sub==='div'||c.sub==='divAll'));
  let sumVal=0;let hasNumber=false;
  cards.forEach(c=>{if(c.kind==='special'&&c.sub!=='div'&&c.sub!=='divAll'){
    if(c.sub==='mult'){
      // ×(-2/3/4)：棄1張手牌，不改變總和
      msg(c.type+'！棄1張手牌');
    }else if(c.sub==='zero'){
      G.total=0;msg(c.type+'！總和歸零！');drawCard(1).forEach(dc=>p.hand.push(dc));msg('你補了 1 張牌');
    }else if(c.sub==='pm'){G.sf=true;msg('± 效果開啟！下一位玩家方向反轉');}
  }else if(c.kind!=='special'){
    let v=c.val;if(G.cur===0&&G.sf){v=-v;G.sf=false;}sumVal+=v;hasNumber=true;
  }
  });
  if(hasNumber||cards.every(c=>c.kind==='special'&&c.sub!=='zero'&&c.sub!=='pm'&&c.sub!=='mult')){
    if(G.total===0){G.total=sumVal;}else{G.total=ones(G.total+sumVal);}}
  if(divCards.length>0){
    divCards.forEach(c=>{if(c.v===0)return;const dividend=oldTotal+c.v+sumVal;const q=dividend/c.v;const newTotal=Number.isInteger(q)?ones(Math.round(q)):NaN;msg(c.type+'：'+fmt(dividend)+' ÷ '+c.v+' = '+fmt(q)+' → '+fmt(newTotal));G.total=newTotal;});
  }
  msg(p.name+' 出了 '+cards.map(c=>cLabel(c)).join('、')+' → 總和 = '+fmt(G.total));
  G.passes=0;G.multi=false;
  if(G.lcd&&p.hand.length===0){
    msg('⚠️ 忘記宣告 Last Card！罰抽 1 張');drawCard(1).forEach(dc=>p.hand.push(dc));G.lcd=false;
  }
  renderAll();checkWin(G.cur);
  if(!G.winner){if(G.extra){G.extra=false;msg(p.name+' 可以再多出一張！');}else{nextTurn();}}
}

// ─── NEXT TURN ───
function nextTurn(){const oldCur=G.cur;G.cur=(G.cur+1)%G.pc;if(G.cur===0){G.round++;G.passes=0;G.multi=false;}console.log('nextTurn: '+oldCur+'->'+G.cur+', round='+G.round);renderAll();if(G.cur>0){setTimeout(()=>{console.log('Scheduling AI turn for cur='+G.cur);doAITurn();},800);}else{msg('你的回合！');}}

// ─── CHECK WIN ───
function checkWin(idx){const p=G.players[idx];if(p.hand.length===0){G.winner=idx;G.winnersName=p.name;setTimeout(()=>showWin(),500);}}

function showWin(){const ov=$('winOv');ov.classList.add('active');const isMe=G.winner===0;recordWin(isMe);playWin();$('wt').textContent=isMe?'🏆 你贏了！':'🏆 '+G.winnersName+' 勝利！';$('wt').style.color=isMe?'#fbbf24':'#f0f4f8';const s=loadStats();$('ws').textContent='勝率：'+s.wins+'勝 '+s.losses+'敗 (共'+s.plays+'局)';}

// ─── SPEED ROUND ───
function showSpeed(){$('speedOv').classList.add('active');$('sval').textContent=fmt(G.total);$('scd').textContent='5';$('sres').textContent='';let t=5;G._speedTimer=setInterval(()=>{t--;$('scd').textContent=''+t;if(t<=0){clearInterval(G._speedTimer);if(G.phase==='speed'&&G.speedW<0){$('sres').textContent='時間到！';setTimeout(endSpeedNoWinner,1000);}}},1000);scheduleAIsSpeed();}
function endSpeedNoWinner(){const allValid=G.players.slice(1).flatMap((p,i)=>{const vi=G.players.indexOf(p);return validCards(p.hand,G.total).map(c=>({card:c,pi:vi}));});if(allValid.length===0)return endSpeedRound();const numCards=allValid.filter(x=>x.card.kind!=='special');const valid=numCards.length>0?numCards:allValid;const pick=valid[Math.floor(Math.random()*valid.length)];G.speedW=pick.pi;const p=G.players[pick.pi];const idx=p.hand.indexOf(pick.card);if(idx>=0)p.hand.splice(idx,1);G.discard.push(pick.card);G.total=ones(G.total+pick.card.val);msg('⚡ '+p.name+' 打出 '+cLabel(pick.card)+' → '+fmt(G.total));endSpeedRound();}
function speedPlay(){if(G.speedP)return;G.speedP=true;const myHand=G.players[0].hand;const valid=validCards(myHand,G.total);if(valid.length===0){msg('你沒有合法牌！');G.speedP=false;return;}$('sres').innerHTML='選擇要出的牌：<div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:10px" id="spCards"></div>';const area=$('spCards');valid.forEach(c=>{const btn=document.createElement('button');btn.className='gc '+cCss(c);btn.style.cssText='width:56px;height:78px;cursor:pointer';btn.textContent=cLabel(c);btn.onclick=()=>{G.speedW=0;const idx=myHand.indexOf(c);if(idx>=0)myHand.splice(idx,1);G.discard.push(c);G.total=ones(G.total+c.val);msg('⚡ 你打出 '+cLabel(c)+' → '+fmt(G.total));area.innerHTML='';$('sres').textContent='✅ 你最快！';setTimeout(endSpeedRound,1500);};area.appendChild(btn);});}
// 舊版 endSpeedRound（已棄用，由下方新版取代）

// ─── AI ───
function scheduleAIsSpeed(){G.players.forEach((p,idx)=>{if(idx===0)return;setTimeout(()=>doAISpeed(idx),Math.random()*4000+500);});}
function doAISpeed(idx){if(G.phase!=='speed'||G.speedP||G.speedW>=0)return;const p=G.players[idx];const valid=validCards(p.hand,G.total);if(valid.length>0&&Math.random()>0.3){G.speedW=idx;const c=valid[Math.floor(Math.random()*valid.length)];const ci=p.hand.indexOf(c);if(ci>=0)p.hand.splice(ci,1);G.discard.push(c);G.total=ones(G.total+c.val);msg('⚡ '+p.name+' 打出 '+cLabel(c)+' → '+fmt(G.total));endSpeedRound();}}

function doAITurn(){try{if(G.phase!=='turn'||G.cur===0||G.winner>=0)return;if(G.aiLock)return;G.aiLock=true;const p=G.players[G.cur];const valid=validCards(p.hand,G.total);if(valid.length===0){G.passes=(G.passes||0)+1;msg(p.name+' Pass 了');if(G.passes>=G.pc-1){G.multi=true;msg('全體 Pass！可一次出多張');}nextTurn();G.aiLock=false;return;}let chosen=valid[Math.floor(Math.random()*valid.length)];if(chosen.kind==='special'){chosen=chooseSpecialAI(chosen,p,valid);}if(!chosen){G.passes++;msg(p.name+' Pass 了');nextTurn();G.aiLock=false;return;}// Execute play SYNCHRONOUSLY (no setTimeout) — duplicate executePlay logic for AI
const idx=p.hand.indexOf(chosen);if(idx>=0)p.hand.splice(idx,1);G.discard.push(chosen);const oldTotal=G.total;const isDiv=chosen.kind==='special'&&(chosen.sub==='div'||chosen.sub==='divAll');let sumVal=0,hasNumber=false;if(chosen.kind==='special'&&!isDiv){if(chosen.sub==='mult')msg(chosen.type+'！棄1張手牌');else if(chosen.sub==='zero'){G.total=0;msg(chosen.type+'！總和歸零！');drawCard(1).forEach(dc=>p.hand.push(dc));}else if(chosen.sub==='pm'){G.sf=true;msg('± 效果開啟！');}}else{let v=chosen.val;if(G.cur===0&&G.sf){v=-v;G.sf=false;}sumVal+=v;hasNumber=true;}if(hasNumber||(chosen.kind==='special'&&!['zero','pm','mult'].includes(chosen.sub))){if(G.total===0)G.total=sumVal;else G.total=ones(G.total+sumVal);}if(isDiv){if(chosen.v!==0){const q=oldTotal/chosen.v;G.total=Number.isInteger(q)?ones(Math.round(q)):NaN;msg(chosen.type+'：'+fmt(oldTotal)+' ÷ '+chosen.v+' = '+fmt(q));}}msg(p.name+' 出了 '+cLabel(chosen)+' → 總和 = '+fmt(G.total));G.passes=0;G.multi=false;renderAll();checkWin(G.cur);if(!G.winner){if(G.extra){G.extra=false;msg(p.name+' 可以再多出一張！');}else{nextTurn();}}G.aiLock=false;}catch(e){console.error('AI error:',e);G.aiLock=false;}}
let _endSpeedActive=false;function endSpeedRound(){if(_endSpeedActive)return;_endSpeedActive=true;$('speedOv').classList.remove('active');clearInterval(G._speedTimer);G.phase='turn';G.cur=G.speedW>=0?G.speedW:0;G.sf=false;G.passes=0;renderAll();if(G.cur>0){setTimeout(()=>{if(G.phase==='turn'&&G.cur>0&&G.winner<0)doAITurn();_endSpeedActive=false;},900);}else{_endSpeedActive=false;msg('你的回合！');}}
function chooseSpecialAI(c,p,valid){// Prefer ×0, then big numbers, then specials
const numCards=valid.filter(x=>x.kind!=='special');if(numCards.length>0&&Math.random()>0.4)return null;// prefer number card
const zeroCard=valid.find(x=>x.type==='×0');if(zeroCard)return zeroCard;
return c;}

// ─── MODALS ───
function closeGen(){$('genMod').classList.remove('active');}
function showGen(title,msg){$('genTitle').textContent=title;$('genMsg').textContent=msg;$('genMod').classList.add('active');}

// ─── SOUND ───
function playTone(freq,dur){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(0.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}catch(e){}
}
function playValid(){playTone(523,0.1);playTone(659,0.15);}
function playInvalid(){playTone(200,0.2);}
function playWin(){playTone(523,0.15);playTone(659,0.15);playTone(784,0.2);}

// ─── PARTICLES ───
function burst(x,y,type){
  const c=document.createElement('div');c.style.cssText='position:fixed;left:'+x+'px;top:'+y+'px;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:9999';document.body.appendChild(c);
  const cols=type==='ice'?['#0077b6','#00b4d8','#90e0ef']:type==='fire'?['#c2410c','#ff6b35','#f4a261']:['#c084fc','#fbbf24'];
  const angle=Math.random()*Math.PI*2,dist=40+Math.random()*60,tx=Math.cos(angle)*dist,ty=Math.sin(angle)*dist;
  c.style.background=cols[Math.floor(Math.random()*cols.length)];
  c.style.transition='all 0.5s ease-out';
  c.style.boxShadow='0 0 8px '+c.style.background;
  requestAnimationFrame(()=>{c.style.transform='translate('+tx+'px,'+ty+'px) scale(0)';c.style.opacity='0';});
  setTimeout(()=>c.remove(),550);
}
function burstAtCard(cardEl,type){if(!cardEl)return;const r=cardEl.getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2,type);}

// ─── STATS ───
function loadStats(){try{return JSON.parse(localStorage.getItem('bf_stats')||'{"wins":0,"losses":0,"plays":0}');}catch(e){return{wins:0,losses:0,plays:0};}}
function saveStats(s){try{localStorage.setItem('bf_stats',JSON.stringify(s));}catch(e){}}
function recordWin(isHuman){const s=loadStats();s.wins+=isHuman?1:0;s.losses+=isHuman?0:1;s.plays++;saveStats(s);}

// Update executePlay to call particle + sound
const _origExecutePlay=executePlay;
executePlay=function(cards){
  const isMe=G.cur===0;
  const topCardEl=document.querySelector('.gc.sel,.gc:hover');
  if(isMe&&cards[0]){
    const type=cards[0].kind==='special'?'special':cards[0].val>0?'ice':'fire';
    burstAtCard(topCardEl,type);
    playValid();
  } else if(!isMe) {
    playTone(330,0.08);
  }
  _origExecutePlay.call(this,cards);
};



// ─── PLAYER BUTTON SELECTORS ───
document.querySelectorAll('.pbtn').forEach(b=>{
  b.onclick=()=>{document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');};
});
</script>
