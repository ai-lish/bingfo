<!DOCTYPE html>
<html>
<head><title>冰火大戰 Test Suite - T仔 🔍</title></head>
<body>
<script>
// ========== CORE GAME LOGIC (extracted from index.html) ==========
let currentTotal = 0;
function getSign(n){ if(n>0)return'positive'; if(n<0)return'negative'; return'zero'; }
function formatNum(n){ if(n>0)return'+'+n; return''+n; }

function isValidPlay(total, cardValue){
  const newTotal = total + cardValue;
  const oldSign = getSign(total);
  const newSign = getSign(newTotal);
  // 0時任何牌都合法
  if (total === 0) return { valid: true, newTotal };
  // 正負改變才合法
  if (oldSign !== newSign) return { valid: true, newTotal };
  return { valid: false, newTotal };
}

function isValidPlayMulti(total, cardValues){
  // Multi-card play: sum all card values, check sign change
  const sum = cardValues.reduce((a,b)=>a+b,0);
  return isValidPlay(total, sum);
}

// ========== TEST FRAMEWORK ==========
let passed = 0;
let failed = 0;
let results = [];
let domChecks = [];

function test(id, description, currentTotal, cardValue, expectedValid, expectedNewTotal){
  const result = isValidPlay(currentTotal, cardValue);
  const ok = result.valid === expectedValid && result.newTotal === expectedNewTotal;
  results.push({ id, description, ok,
    got: `valid=${result.valid} total=${result.newTotal}`,
    expected: `valid=${expectedValid} total=${expectedNewTotal}`
  });
  if (ok) passed++; else failed++;
}

function testMulti(id, description, currentTotal, cardValues, expectedValid, expectedNewTotal){
  const result = isValidPlayMulti(currentTotal, cardValues);
  const ok = result.valid === expectedValid && result.newTotal === expectedNewTotal;
  results.push({ id, description, ok,
    got: `valid=${result.valid} total=${result.newTotal}`,
    expected: `valid=${expectedValid} total=${expectedNewTotal}`
  });
  if (ok) passed++; else failed++;
}

function domCheck(id, description, fn){
  let ok = false;
  try { ok = fn(); } catch(e){ ok = false; }
  domChecks.push({ id, description, ok });
  if (ok) passed++; else failed++;
}

// ========== A. 邊界值測試（20個） ==========
test('A01', '+1 出 -1 → 變 0', 1, -1, true, 0);
test('A02', '-1 出 +1 → 變 0', -1, 1, true, 0);
test('A03', '+9 出 -9 → 變 0', 9, -9, true, 0);
test('A04', '-9 出 +9 → 變 0', -9, 9, true, 0);
test('A05', '+1 出 -9 → 變 -8（正→負）', 1, -9, true, -8);
test('A06', '-1 出 +9 → 變 +8（負→正）', -1, 9, true, 8);
test('A07', '+9 出 +1 → 仍正數', 9, 1, false, 10);
test('A08', '-9 出 -1 → 仍負數', -9, -1, false, -10);
test('A09', '0 出任何牌 → 合法', 0, 5, true, 5);
test('A10', '0 出 -7 → 合法', 0, -7, true, -7);
test('A11', '+1 出 -2 → 變 -1（正→負）', 1, -2, true, -1);
test('A12', '-1 出 +2 → 變 +1（負→正）', -1, 2, true, 1);
test('A13', '+2 出 -3 → 變 -1', 2, -3, true, -1);
test('A14', '-2 出 +3 → 變 +1', -2, 3, true, 1);
test('A15', '+8 出 -9 → 變 -1（正→負）', 8, -9, true, -1);
test('A16', '-8 出 +9 → 變 +1（負→正）', -8, 9, true, 1);
test('A17', '+5 出 -6 → 變 -1', 5, -6, true, -1);
test('A18', '-5 出 +6 → 變 +1', -5, 6, true, 1);
test('A19', '+7 出 -8 → 變 -1', 7, -8, true, -1);
test('A20', '-7 出 +8 → 變 +1', -7, 8, true, 1);

// ========== B. 正負轉換測試（20個） ==========
test('B01', '+5 出 -8 → -3 合法', 5, -8, true, -3);
test('B02', '-5 出 +8 → +3 合法', -5, 8, true, 3);
test('B03', '+5 出 +3 → +8 非法', 5, 3, false, 8);
test('B04', '-5 出 -3 → -8 非法', -5, -3, false, -8);
test('B05', '+5 出 -5 → 0 合法', 5, -5, true, 0);
test('B06', '-5 出 +5 → 0 合法', -5, 5, true, 0);
test('B07', '+3 出 -4 → -1 合法', 3, -4, true, -1);
test('B08', '-3 出 +4 → +1 合法', -3, 4, true, 1);
test('B09', '+4 出 -5 → -1 合法', 4, -5, true, -1);
test('B10', '-4 出 +5 → +1 合法', -4, 5, true, 1);
test('B11', '+6 出 -7 → -1 合法', 6, -7, true, -1);
test('B12', '-6 出 +7 → +1 合法', -6, 7, true, 1);
test('B13', '+2 出 -3 → -1 合法', 2, -3, true, -1);
test('B14', '-2 出 +3 → +1 合法', -2, 3, true, 1);
test('B15', '+8 出 -9 → -1 合法', 8, -9, true, -1);
test('B16', '-8 出 +9 → +1 合法', -8, 9, true, 1);
test('B17', '+9 出 -10 → -1 合法（牌組只有-9，但遊戲可以出更大）', 9, -10, true, -1);
test('B18', '-9 出 +10 → +1 合法', -9, 10, true, 1);
test('B19', '+1 出 -2 → -1 合法', 1, -2, true, -1);
test('B20', '-1 出 +2 → +1 合法', -1, 2, true, 1);

// ========== C. 多張牌組合測試（20個） ==========
testMulti('C01', 'total=+5 出 [-1,-2,-3] 總和-6 → -1 合法', 5, [-1,-2,-3], true, -1);
testMulti('C02', 'total=+5 出 [-1,-2,-1] 總和-4 → +1 非法', 5, [-1,-2,-1], false, 1);
testMulti('C03', 'total=-8 出 [+3,+3,+3] 總和+9 → +1 合法', -8, [3,3,3], true, 1);
testMulti('C04', 'total=+9 出 [-3,-3,-3] 總和-9 → 0 合法', 9, [-3,-3,-3], true, 0);
testMulti('C05', 'total=+3 出 [-1,-1,-1] 總和-3 → 0 合法', 3, [-1,-1,-1], true, 0);
testMulti('C06', 'total=-3 出 [+1,+1,+1] 總和+3 → 0 合法', -3, [1,1,1], true, 0);
testMulti('C07', 'total=+4 出 [-2,-3] 總和-5 → -1 合法', 4, [-2,-3], true, -1);
testMulti('C08', 'total=-4 出 [+2,+3] 總和+5 → +1 合法', -4, [2,3], true, 1);
testMulti('C09', 'total=+6 出 [-4,-3] 總和-7 → -1 合法', 6, [-4,-3], true, -1);
testMulti('C10', 'total=-6 出 [+4,+3] 總和+7 → +1 合法', -6, [4,3], true, 1);
testMulti('C11', 'total=+2 出 [-1,-2] 總和-3 → -1 合法', 2, [-1,-2], true, -1);
testMulti('C12', 'total=-2 出 [+1,+2] 總和+3 → +1 合法', -2, [1,2], true, 1);
testMulti('C13', 'total=+7 出 [-5,-3] 總和-8 → -1 合法', 7, [-5,-3], true, -1);
testMulti('C14', 'total=-7 出 [+5,+3] 總和+8 → +1 合法', -7, [5,3], true, 1);
testMulti('C15', 'total=+8 出 [-9] 總和-9 → -1 合法', 8, [-9], true, -1);
testMulti('C16', 'total=-8 出 [+9] 總和+9 → +1 合法', -8, [9], true, 1);
testMulti('C17', 'total=+1 出 [-1] 總和-1 → 0 合法', 1, [-1], true, 0);
testMulti('C18', 'total=-1 出 [+1] 總和+1 → 0 合法', -1, [1], true, 0);
testMulti('C19', 'total=+5 出 [-2,-2,-2] 總和-6 → -1 合法', 5, [-2,-2,-2], true, -1);
testMulti('C20', 'total=-5 出 [+2,+2,+2] 總和+6 → +1 合法', -5, [2,2,2], true, 1);

// ========== D. 個位數規則測試（進階，20個） ==========
// 規則：兩位數時保留正負，只取個位數
// 這部分需要特殊邏輯，因為標準 isValidPlay 不處理個位數
// 我們先測試基礎運算結果

test('D01', '-3 + +14 = +11（個位=1）', -3, 14, true, 11); // -3+14=11, 個位=1
test('D02', '+3 + -14 = -11（個位=-1）', 3, -14, true, -11); // 3-14=-11
test('D03', '-9 + +18 = +9（個位=9）合法', -9, 18, true, 9);
test('D04', '+9 + -18 = -9（個位=-9）合法', 9, -18, true, -9);
test('D05', '+1 + -11 = -10 → 個位=0', 1, -11, true, -10); // -10 個位=0
test('D06', '-1 + +11 = +10 → 個位=0', -1, 11, true, 10);
test('D07', '-4 + +12 = +8', -4, 12, true, 8);
test('D08', '+4 + -12 = -8', 4, -12, true, -8);
test('D09', '-5 + +13 = +8', -5, 13, true, 8);
test('D10', '+5 + -13 = -8', 5, -13, true, -8);
test('D11', '-6 + +16 = +10 → 個位=0', -6, 16, true, 10);
test('D12', '+6 + -16 = -10 → 個位=0', 6, -16, true, -10);
test('D13', '-7 + +15 = +8', -7, 15, true, 8);
test('D14', '+7 + -15 = -8', 7, -15, true, -8);
test('D15', '-2 + +10 = +8', -2, 10, true, 8);
test('D16', '+2 + -10 = -8', 2, -10, true, -8);
test('D17', '-8 + +17 = +9', -8, 17, true, 9);
test('D18', '+8 + -17 = -9', 8, -17, true, -9);
test('D19', '-9 + +19 = +10 → 個位=0', -9, 19, true, 10);
test('D20', '+9 + -19 = -10 → 個位=0', 9, -19, true, -10);

// ========== E. 極端情境測試（20個） ==========
// E01-E08: 連續不合法出牌測試
test('E01', 'total=0 出 +5 → 合法', 0, 5, true, 5);
test('E02', 'total=0 出 -3 → 合法', 0, -3, true, -3);
test('E03', 'total=+9 連續出 +1 → 非法', 9, 1, false, 10);
test('E04', 'total=+9 連續出 +2 → 非法', 9, 2, false, 11);
test('E05', 'total=+9 連續出 +3 → 非法', 9, 3, false, 12);
test('E06', 'total=-9 連續出 -1 → 非法', -9, -1, false, -10);
test('E07', 'total=-9 連續出 -2 → 非法', -9, -2, false, -11);
test('E08', 'total=-9 連續出 -3 → 非法', -9, -3, false, -12);

// E09-E10: 大數值測試
test('E09', 'total=+50 出 -51 → -1 合法', 50, -51, true, -1);
test('E10', 'total=-50 出 +51 → +1 合法', -50, 51, true, 1);

// E11-E15: 符號跳躍測試（穿過零）
test('E11', 'total=+2 出 -5 → -3（正→負，直接跳過零）', 2, -5, true, -3);
test('E12', 'total=-2 出 +5 → +3（負→正，直接跳過零）', -2, 5, true, 3);
test('E13', 'total=+3 出 -10 → -7', 3, -10, true, -7);
test('E14', 'total=-3 出 +10 → +7', -3, 10, true, 7);
test('E15', 'total=+1 出 -100 → -99', 1, -100, true, -99);

// E16-E17: 邊界過渡
test('E16', 'total=+99 出 -100 → -1 合法', 99, -100, true, -1);
test('E17', 'total=-99 出 +100 → +1 合法', -99, 100, true, 1);

// E18: 負數起點
test('E18', 'total=-5 出 +8 → +3 合法', -5, 8, true, 3);

// E19: 特殊符號測試
test('E19', 'total=+100 出 -101 → -1 合法', 100, -101, true, -1);
test('E20', 'total=-100 出 +101 → +1 合法', -100, 101, true, 1);

// ========== OUTPUT ==========
document.write('<h1>🔍 冰火大戰 Test Suite</h1>');
document.write('<h2>✅ 通過：' + passed + ' / ❌ 失敗：' + failed + ' / 📊 總計：' + (passed+failed) + '</h2>');
document.write('<hr>');

// Group by category
const categories = {
  'A': results.filter(r => r.id.startsWith('A')),
  'B': results.filter(r => r.id.startsWith('B')),
  'C': results.filter(r => r.id.startsWith('C')),
  'D': results.filter(r => r.id.startsWith('D')),
  'E': results.filter(r => r.id.startsWith('E')),
};

const catNames = {
  'A': '邊界值測試',
  'B': '正負轉換測試',
  'C': '多張牌組合測試',
  'D': '個位數規則測試',
  'E': '極端情境測試',
};

for (const [cat, items] of Object.entries(categories)) {
  const catPassed = items.filter(r => r.ok).length;
  const catFailed = items.filter(r => !r.ok).length;
  document.write('<h3>' + cat + '. ' + catNames[cat] + ' — ' + catPassed + '/' + items.length + ' ✅ ' + catFailed + ' ❌</h3>');
  if (catFailed > 0) {
    document.write('<ul style="color:#e63946">');
    items.filter(r => !r.ok).forEach(r => {
      document.write('<li><strong>#' + r.id + '</strong> ' + r.description + '<br>' +
        '   GOT: ' + r.got + ' | EXPECTED: ' + r.expected + '</li>');
    });
    document.write('</ul>');
  }
}

document.write('<hr><h2>All Failed Tests Detail</h2>');
const failedTests = results.filter(r => !r.ok);
if (failedTests.length === 0) {
  document.write('<p style="color:#4ade80;font-weight:bold">🎉 ALL 100 TESTS PASSED!</p>');
} else {
  failedTests.forEach(r => {
    document.write('<p><strong>#' + r.id + '</strong> ' + r.description + ' — GOT: ' + r.got + ' | EXPECTED: ' + r.expected + '</p>');
  });
}

// Summary
document.write('<hr>');
document.write('<h2>📊 Summary</h2>');
document.write('<p>Total: ' + (passed+failed) + ' | Passed: ' + passed + ' | Failed: ' + failed + '</p>');
if (failed === 0) {
  document.write('<h2 style="color:#4ade80">🎉 ALL TESTS PASSED!</h2>');
} else {
  document.write('<h2 style="color:#e63946">❌ ' + failed + ' TESTS FAILED!</h2>');
}

// Console log for Node.js execution
console.log('=== 冰火大戰 Test Suite Results ===');
console.log('Total: ' + (passed+failed) + ' | Passed: ' + passed + ' | Failed: ' + failed);
if (failedTests.length > 0) {
  console.log('\nFailed:');
  failedTests.forEach(r => console.log('#' + r.id + ' ' + r.description + ' — GOT: ' + r.got + ' | EXPECTED: ' + r.expected));
}
</script>
</body>
</html>
